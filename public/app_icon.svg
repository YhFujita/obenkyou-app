<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景：角丸四角形（余白なしのフルサイズ） -->
  <rect x="0" y="0" width="100" height="100" rx="16" ry="16" fill="#FFF9E6" stroke="#FFE082" stroke-width="4"/>
  
  <!-- ウサギの耳 -->
  <!-- 左耳 -->
  <ellipse cx="36" cy="22" rx="9" ry="22" fill="#FFFFFF" stroke="#FF8A8A" stroke-width="3" transform="rotate(-10 36 22)"/>
  <ellipse cx="36" cy="22" rx="4.5" ry="15" fill="#FFC0CB" transform="rotate(-10 36 22)"/>
  <!-- 右耳 -->
  <ellipse cx="64" cy="22" rx="9" ry="22" fill="#FFFFFF" stroke="#FF8A8A" stroke-width="3" transform="rotate(10 64 22)"/>
  <ellipse cx="64" cy="22" rx="4.5" ry="15" fill="#FFC0CB" transform="rotate(10 64 22)"/>

  <!-- ウサギの顔（より大きく） -->
  <circle cx="50" cy="56" r="25" fill="#FFFFFF" stroke="#FF8A8A" stroke-width="3"/>

  <!-- 大きくて真ん丸な黒目と白いハイライト（より印象的に） -->
  <!-- 左目 -->
  <circle cx="39" cy="52" r="6" fill="#2C3E50"/>
  <circle cx="36.5" cy="48.5" r="2.2" fill="#FFFFFF"/>
  <circle cx="41.5" cy="54.5" r="1" fill="#FFFFFF"/>
  <!-- 右目 -->
  <circle cx="61" cy="52" r="6" fill="#2C3E50"/>
  <circle cx="58.5" cy="48.5" r="2.2" fill="#FFFFFF"/>
  <circle cx="63.5" cy="54.5" r="1" fill="#FFFFFF"/>

  <!-- 鼻と口 -->
  <polygon points="50,59 47,56 53,56" fill="#FF8A8A"/>
  <path d="M 46 61 Q 50 63.5 50 61 Q 50 63.5 54 61" fill="none" stroke="#2C3E50" stroke-width="2.2" stroke-linecap="round"/>

  <!-- ほっぺ（ピンクのチーク） -->
  <circle cx="29" cy="60" r="5" fill="#FF8A8A" opacity="0.5"/>
  <circle cx="71" cy="60" r="5" fill="#FF8A8A" opacity="0.5"/>

  <!-- 手 -->
  <ellipse cx="34" cy="74" rx="4.5" ry="7" fill="#FFFFFF" stroke="#FF8A8A" stroke-width="2.5" transform="rotate(20 34 74)"/>
  <ellipse cx="66" cy="74" rx="4.5" ry="7" fill="#FFFFFF" stroke="#FF8A8A" stroke-width="2.5" transform="rotate(-20 66 74)"/>

  <!-- 鉛筆（少し右下に配置し、大きく表示） -->
  <g transform="translate(76, 62) rotate(15) scale(1.1)">
    <!-- 鉛筆のボディ -->
    <rect x="-6" y="-22" width="12" height="26" fill="#4FC3F7" rx="1.5"/>
    <rect x="-2" y="-22" width="4" height="26" fill="#29B6F6"/>
    <!-- 木の部分 -->
    <polygon points="-6,-22 6,-22 0,-32" fill="#FFE0B2"/>
    <!-- 芯 -->
    <polygon points="-2.5,-28 2.5,-28 0,-32" fill="#4FC3F7"/>
    <!-- 消しゴム -->
    <rect x="-6" y="4" width="12" height="6" fill="#FF8A8A" rx="1.5"/>
    <!-- 金具部分 -->
    <rect x="-6" y="2" width="12" height="2" fill="#B0BEC5"/>
  </g>
</svg>
